<!DOCTYPE html>
<html lang="en">
  <load src="html/head.html" />

  <body>
    <div id="mediaQueryDebug"></div>
    <load src="html/warnings.html" />
    <div id="fpsCounter" class="hidden"></div>
    <div class="customBackground"></div>
    <div id="backgroundLoader" style="display: none"></div>
    <div id="bannerCenter" class="focus"></div>
    <div id="notificationCenter">
      <div class="clearAll button invisible" style="display: none">
        <i class="fas fa-times"></i>
        Clear all
      </div>
      <div class="history"></div>
    </div>
    <div id="barTimerProgress" class="timerMain">
      <div class="opacityWrapper" style="opacity: 0">
        <div class="bar"></div>
      </div>
    </div>
    <div class="content-grid scrollToTopContainer">
      <div class="scrollToTopButton invisible breakout">
        <i class="fas fa-angle-double-up"></i>
      </div>
    </div>
    <div id="popups">
      <load src="html/popups.html" />
    </div>

    <div id="app" class="content-grid focus hidden">
      <load src="html/header.html" />
      <main class="full-width content-grid" style="height: 100%">
        <load src="html/pages/loading.html" />
        <load src="html/pages/about.html" />
        <load src="html/pages/settings.html" />
        <load src="html/pages/test.html" />
        <load src="html/pages/404.html" />
      </main>
      <load src="html/footer.html" />
      <div id="ad-footer-wrapper" class="full-width" style="text-align:center;padding:0.5rem 0;">
        <div id="ad-footer" style="width:100%;max-width:728px;min-height:90px;margin:0 auto;background:var(--sub-alt-color);display:flex;align-items:center;justify-content:center;color:var(--sub-color);font-size:0.85rem;border-radius:0.25rem;">
          advertisement
        </div>
      </div>
    </div>
    <link rel="stylesheet" href="themes/serika_dark.css" id="currentTheme" />
    <script type="module" src="ts/index.ts"></script>
  </body>
</html>
